name: gigs_court
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  google_fonts: ^8.1.0
  smooth_page_indicator: ^2.0.1
  flutter_screenutil: ^5.9.3
  firebase_auth: ^6.5.4
  image_picker: ^1.2.2
  http: ^1.6.0
  dio: ^5.9.2
  cloud_functions: ^6.3.3
  provider: ^6.1.5+1
  supabase_flutter: ^2.15.0
  geolocator: 14.0.2
  google_maps_flutter: ^2.17.1
  go_router: ^17.3.0
  cloud_firestore: ^6.6.0
  firebase_remote_config: ^6.5.3
  cached_network_image: ^3.4.1
  record: ^7.1.1
  audioplayers: ^6.8.1
  path_provider: ^2.1.6
  webview_flutter: ^4.14.0
  firebase_messaging: ^16.4.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  device_info_plus: 10.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"